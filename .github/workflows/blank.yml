name: Auto Extend Server

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

jobs:
  exploit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies & Chrome
        run: |
          sudo apt update
          sudo apt install -y xvfb wget curl unzip gnupg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt update
          sudo apt install -y google-chrome-stable
          pip install seleniumbase undetected-chromedriver gdown

      - name: Download Exploiting.zip from Google Drive
        run: |
          gdown "https://drive.google.com/uc?id=1suqMsbh-NxSoVItN5l59gjytfbdSJPBO" -O Exploiting.zip

      - name: Unzip and run
        run: |
          unzip -o Exploiting.zip
          python Exploiting.py

      - name: Update run log
        run: |
          mkdir -p logs
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') - Auto Extend completed" >> logs/runs.log
          git config user.name "github-actions"
          git config.user.email "actions@github.com"
          git add logs/runs.log
          git commit -m "Log: Auto run at $(date -u '+%Y-%m-%d %H:%M:%S')" || true
          git push || true
